<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <form action="">
        <div class="inputs">
            <div>
                <label for="Title">Title</label><br>
                <input type="text" id="Title">
            </div>
            <div>
                <label for="Author">Author</label><br>
                <input type="text" id="Author">
            </div>
            <div>
                <label for="Pages">Pages</label><br>
                <input type="pages" id="pages">
            </div>
            <div>
                <label for="haveRead">have read?</label><br>
                <input type="haveRead" id="haveRead">
            </div>
            <button  type="button" class="addButton">Add book</button>
            <button type="button" class="displayButton">Display books</button>
        </div>
    </form>
    <table class="displayBook">
        <tr class="table">
            <th>Title</th>
            <th>Author</th>
            <th>Pages</th>
            <th>Have read?</th>
        </tr>
    </table>
    <script src="main.js"></script>
</body>
</html>
